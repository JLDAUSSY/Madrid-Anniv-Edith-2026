<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photos</title>

<style>

body{
    margin:0;
    background:black;
    height:100vh;
    touch-action:pan-y;
}

#viewer{
    position:relative;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden; /* seulement le viewer */
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain; 
    top:0;
    left:0;
    opacity:0;
    transition:opacity 1s ease-in-out, transform 8s ease-in-out;
}

.visible{
    opacity:1;
}

.zoom{
    transform:scale(1.05);
}

#caption{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:18px;
    background:rgba(0,0,0,0.4);
    padding:10px;
    z-index:10;
}

.nav{
    position:absolute;
    top:50%;
    font-size:40px;
    color:white;
    cursor:pointer;
    padding:10px;
    user-select:none;
    z-index:10;
}

.left{left:10px}
.right{right:10px}

/* Bouton retour à la carte */
.back{
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    padding:14px 20px; 
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    font-size:22px;
    z-index:20; /* supérieur au caption */
}

@media(max-width:600px){
    #caption{font-size:14px}
    .nav{font-size:30px}
    .back{font-size:18px; padding:10px 14px;}
}

</style>

</head>

<body>

<a href="map.html" class="back">← Carte</a>

<div id="viewer">
    <img id="img1" class="slide visible">
    <img id="img2" class="slide">
</div>

<div class="nav left" onclick="prev()">❮</div>
<div class="nav right" onclick="next()">❯</div>

<div id="caption"></div>

<script src="script.js"></script>

</body>
</html>
